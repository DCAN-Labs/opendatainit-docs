site_name: MIDB Open Data Repository SOP

theme:
  name: readthedocs
  custom_dir: docs/overrides # for template overrides, used in this case for addition of "Page Last Updated: <DATE>" to pages

markdown_extensions:
  - toc:
      permalink: '🔗' 
  - admonition

extra_javascript:
  - js/extra.js

plugins:
  - search
  - git-revision-date-localized:
      type: date

docs_dir: docs
nav:
  - About:
     - MIDB Open Data Initiative: index.md
  - Step-by-Step Guide:
      - "Step 1: Prepare Data": sop/prep-data.md 
      - "Step 2: Create AWS S3 Bucket": sop/aws.md
      - "Step 3: DataLad": sop/datalad.md
  - Resources: 
      - Checklist: helper-files/checklist.md
      - Resources List: helper-files/resources.md
  - Appendix:
      - Tracking Repo Usage: appendix/access-logging.md
      - OpenNeuro Integration: appendix/openneuro.md
      - Troubleshooting: appendix/troubleshooting.md
      - Maintenance: appendix/maintenance.md
      
      

      
